<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Patient</title>
    <link rel="stylesheet" href="nouveaupatient.css">
    <link rel="icon" href="E:\Projetsliwi\imag\logo.png" type="image/x-icon">
</head>
<body>
    <div class="form-container">
        <button id="retour" onclick="window.history.back()">
            <i class="fas fa-arrow-left"><img src="E:\Projetsliwi\imag\left-arrow.png"></i>
        </button>
        <form class="patient-form">
            <h2>Nouveau Patient</h2>
            <div class="form-group">
                <label for="name">Nom Prénom</label>
                <input type="text" id="name" name="name">
                <label for="sex">Sex</label>
                <select id="sex" name="sex">
                    <option value="">Sélectionner Sex</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dob">Né(e) Le</label>
                <input type="date" id="dob" name="dob">
                <label for="age">Âge</label>
                <input type="text" id="age" name="age">
            </div>
            <div class="form-group">
                <label for="identity">Pièce identité</label>
                <select id="identity" name="identity">
                    <option value="">Sélectionner Pièce Identité</option>
                    <option value="id">CIN</option>
                    <option value="passport">Passport</option>
                    <option value="passport">Carte sejour</option>
                    <option value="passport">Permis</option>
                </select>
                <label for="idnumber">N°Pièce Identité</label>
                <input type="text" id="idnumber" name="idnumber">
            </div>
            <div class="form-group">
                <label for="family">Situation Familiale</label>
                <select id="family" name="family">
                    <option value="">Sélectionner Situation</option>
                    <option value="single">Celibataire</option>
                    <option value="married">Marié</option>
                    <option value="married">veuf(e)</option>
                </select>
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="insurance">Assurance</label>
                <select id="insurance" name="insurance">
                    <option value="">Sélectionner Assurance</option>
                    <option value="none">CNOPS</option>
                    <option value="basic">CNSS</option>
                    <option value="premium">MAFAR</option>
                    <option value="premium">SAHAM</option>
                </select>
                <label for="registration">Immatriculation</label>
                <input type="text" id="registration" name="registration">
            </div>
            <div class="form-group">
                <label for="telephone">telephone</label>
                <input type="text" id="telephone" name="telephone">
                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" name="adresse">
            </div>
            <div class="form-actions">
                <button type="reset" class="btn-reset">Annuler</button>
                <button type="submit" class="btn-submit">Enregistrer</button>
            </div>
        </form>
    </div>
</body>
</html>
