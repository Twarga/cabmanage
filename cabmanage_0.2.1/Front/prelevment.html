<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prélèvement</title>
    <link rel="stylesheet" href="prelevment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="E:\Projetsliwi\imag\logo.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <button id="retour" onclick="window.history.back()">
            <i class="retour-btn"><img src="E:\Projetsliwi\imag\left-arrow.png"></i>
        </button>
        <div class="form-section">
            <div class="left-form">
                <h2>Prélèvement : &lt;Patient Name&gt;</h2>
                <div class="form-group">
                    <label for="typePrelevement">Type Prélèvement</label>
                    <select id="typePrelevement">
                        <option>Sélectionner Type Prélèvement</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dateReception">Date Réception</label>
                    <input type="date" id="dateReception">
                </div>
                <div class="form-group">
                    <label for="dateReponse">Date Réponse</label>
                    <input type="date" id="dateReponse">
                </div>
                <div class="form-group">
                    <label for="medecin">Médecin</label>
                    <input type="text" id="medecin">
                </div>
                <div class="form-group">
                    <label for="organisme">Organisme</label>
                    <select id="organisme">
                        <option>Sélectionner Organisme</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="lieuPrelevement">Lieu de Prélèvement</label>
                    <select id="lieuPrelevement">
                        <option>Sélectionner Lieu de Prélèvement</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nombreFlacon">Nombre de flacon</label>
                    <input type="number" id="nombreFlacon">
                </div>
                <div class="form-group">
                    <label for="examen">Examen</label>
                    <select id="examen">
                        <option>Sélectionner Examen</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pieceJointe">Ordonnance</label>
                    <input type="file" id="pieceJointe">
                </div>
            </div>
            <div class="right-form">
                <h2>Facturation</h2>
                <div class="form-facture">
                    <label for="totalPrix">Total Prix</label>
                    <input type="text" id="totalPrix" value="0,00" readonly>
                </div>
                <div class="form-facture">
                    <label for="prixReduit">Prix Réduit</label>
                    <input type="text" id="prixReduit" value="0,00" readonly>
                </div>
                <div class="form-facture">
                    <label for="avance">Avance</label>
                    <input type="text" id="avance" value="0,00" readonly>
                </div>
                <div class="form-facture">
                    <label for="montantDu">Montant Du</label>
                    <input type="text" id="montantDu" value="0,00" readonly>
                </div>
                <div class="form-facture">
                    <label for="reste">Reste</label>
                    <input type="text" id="reste" value="0,00" readonly>
                </div>
                <div class="form-facture">
                    <label for="etatPaiement">État du Paiement</label>
                    <input type="text" id="etatPaiement" readonly>
                </div>
            </div>
        </div>
        <div class="report-section">
            <h2>Rapport</h2>
            <div class="form-group">
                <label for="rapportTemplate">Rapport Template</label>
                <select id="rapportTemplate">
                    <option></option>
                </select>
            </div>
            <div class="report-content">
                &lt;Vide&gt;
            </div>
            <div class="report-buttons">
                <button id="ajouter">Ajouter</button>
                <button id="ajouter">Enregistrer un modèle</button>
            </div>
        </div>
        <div class="history-section">
            <h2>Historique de Prélèvement</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Date Réception</th>
                        <th>Date Création</th>
                        <th>N° de Flacons</th>
                        <th>Docteur Extérieur</th>
                        <th>État de paiement</th>
                        <th>Reste</th>
                        <th>Ordonnance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Type A</td>
                        <td>01/01/2023</td>
                        <td>02/01/2023</td>
                        <td>5</td>
                        <td>Dr. Smith</td>
                        <td>Paid</td>
                        <td>0,00</td>
                        <td>Prescription</td>
                        <td>
                            <button class="print-btn"><img src="E:\Projetsliwi\imag\printer.png" alt="Print"></button>
                            <button class="edit-btn"><img src="E:\Projetsliwi\imag\write.png" alt="Edit"></button>
                            <button class="delete-btn"><img src="E:\Projetsliwi\imag\delete.png" alt="Delete"></button>
                        </td>
                    </tr>
                    <!-- More rows can be added here -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
